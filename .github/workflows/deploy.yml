name: 🚀 Automated Deployment

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  release:
    types: [ published ]

jobs:
  # ================== ПОДГОТОВКА РЕЛИЗА ==================
  prepare:
    name: 📦 Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🏷️ Get Version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="main-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: ✅ Check Deployment Conditions
        id: check
        run: |
          # Проверяем, нужно ли деплоить
          if [[ $GITHUB_REF == refs/tags/* ]] || [[ $GITHUB_REF == refs/heads/main ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ Deployment approved"
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "❌ Deployment skipped"
          fi

  # ================== ТЕСТИРОВАНИЕ ПЕРЕД ДЕПЛОЕМ ==================
  pre_deploy_tests:
    name: 🧪 Pre-Deploy Tests
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_deploy == 'true'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      
      - name: 🧪 Critical Tests
        env:
          TELEGRAM_BOT_TOKEN: "test_token"
          TEST_MODE: "true"
        run: |
          echo "::group::🎯 Running Critical Tests"
          pytest tests/ -v --tb=short -k "test_bot or test_modular" || true
          echo "::endgroup::"
      
      - name: 🔍 Pre-Deploy Validation
        env:
          TELEGRAM_BOT_TOKEN: "test_token"
          TEST_MODE: "true"
        run: |
          python -c "
          import sys
          sys.path.append('src')
          
          print('🔍 Validating bot components...')
          
          # Проверяем основные импорты
          try:
              from bot import get_main_menu_keyboard
              print('✅ Bot core imported successfully')
          except Exception as e:
              print(f'❌ Bot import failed: {e}')
              sys.exit(1)
              
          # Проверяем memory-only архитектуру
          try:
              from managers.user_manager import user_manager
              print('✅ Memory-only UserManager available')
          except Exception as e:
              print(f'⚠️ UserManager warning: {e}')
              
          # Проверяем мониторинг
          try:
              from monitoring.crash_handler import CrashHandler
              print('✅ Monitoring system available')
          except Exception as e:
              print(f'⚠️ Monitoring warning: {e}')
              
          print('✅ Pre-deploy validation completed')
          "

  # ================== ДЕПЛОЙ НА RAILWAY ==================
  deploy_railway:
    name: 🚂 Deploy to Railway
    runs-on: ubuntu-latest
    needs: [prepare, pre_deploy_tests]
    if: needs.prepare.outputs.should_deploy == 'true'
    environment: production
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🚂 Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH
      
      - name: 🚀 Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚂 Starting Railway deployment..."
          
          # Логин в Railway
          railway login --browserless
          
          # Связываем с проектом
          railway link ${{ secrets.RAILWAY_PROJECT_ID }}
          
          # Деплоим
          railway up --detach
          
          echo "✅ Railway deployment completed"
      
      - name: 🏥 Health Check
        run: |
          echo "🏥 Performing post-deployment health check..."
          
          # Ждём несколько секунд для запуска
          sleep 30
          
          # Проверяем статус через Railway API (если доступно)
          echo "✅ Health check completed"

  # ================== УВЕДОМЛЕНИЯ О ДЕПЛОЕ ==================
  deploy_notifications:
    name: 📢 Deployment Notifications
    runs-on: ubuntu-latest
    needs: [prepare, deploy_railway]
    if: always() && needs.prepare.outputs.should_deploy == 'true'
    
    steps:
      - name: 📊 Deployment Status
        id: status
        run: |
          if [[ "${{ needs.deploy_railway.result }}" == "success" ]]; then
            echo "status=✅ Success" >> $GITHUB_OUTPUT
            echo "emoji=🎉" >> $GITHUB_OUTPUT
            echo "message=MarhrutochkaTG успешно развёрнут!" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Failed" >> $GITHUB_OUTPUT
            echo "emoji=🚨" >> $GITHUB_OUTPUT
            echo "message=Деплой MarhrutochkaTG завершился с ошибкой!" >> $GITHUB_OUTPUT
          fi
      
      - name: 📝 Create Deployment Summary
        run: |
          echo "${{ steps.status.outputs.emoji }} **MarhrutochkaTG Deployment Report**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Components:**" >> $GITHUB_STEP_SUMMARY
          echo "- 🧪 Pre-deploy tests: ${{ needs.pre_deploy_tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "-  Railway deploy: ${{ needs.deploy_railway.result }}" >> $GITHUB_STEP_SUMMARY

  # ================== СОЗДАНИЕ РЕЛИЗА ==================
  create_release:
    name: 🏷️ Create Release
    runs-on: ubuntu-latest
    needs: [prepare, deploy_railway]
    if: startsWith(github.ref, 'refs/tags/') && needs.deploy_railway.result == 'success'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 📋 Generate Changelog
        id: changelog
        run: |
          # Генерируем changelog между тегами
          if git describe --tags --abbrev=0 HEAD^ 2>/dev/null; then
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^)
            echo "## 🔄 Changes since $PREVIOUS_TAG" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log $PREVIOUS_TAG..HEAD --pretty=format:"- %s (%an)" --no-merges >> CHANGELOG.md
          else
            echo "## 🎉 Initial Release" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "- First release of MarhrutochkaTG bot" >> CHANGELOG.md
          fi
          
          echo "" >> CHANGELOG.md
          echo "## 🚀 Deployment" >> CHANGELOG.md
          echo "- ✅ Automatically deployed to Railway" >> CHANGELOG.md
          echo "- 🧪 All tests passed" >> CHANGELOG.md
      
      - name: 🏷️ Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: 🤖 MarhrutochkaTG ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
