name: 🚀 Simple Railway Deploy

# Required secrets: RAILWAY_TOKEN, RAILWAY_SERVICE_ID

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  deploy:
    name: 🚂 Deploy to Railway
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🚂 Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH
      
      - name: 🚀 Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚂 Deploying to Railway..."
          
          # Check if service ID is provided
          if [ -n "${{ secrets.RAILWAY_SERVICE_ID }}" ]; then
            echo "Using specific service: ${{ secrets.RAILWAY_SERVICE_ID }}"
            railway up --service=${{ secrets.RAILWAY_SERVICE_ID }} --detach
          else
            echo "Auto-detecting service..."
            railway up --detach
          fi
          
          echo "✅ Deployment completed!"
      
      - name: 📊 Summary
        run: |
          echo "🎉 **MarhrutochkaTG deployed successfully!**" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
