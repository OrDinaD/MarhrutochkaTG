name: 🧪 Manual Testing

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Тип тестирования'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - performance
          - security
      python_version:
        description: 'Версия Python'
        required: true
        default: '3.11'
        type: choice
        options:
          - '3.9'
          - '3.10'
          - '3.11'
          - '3.12'
      verbose:
        description: 'Подробный вывод'
        required: false
        default: true
        type: boolean

jobs:
  # ================== РУЧНОЕ ТЕСТИРОВАНИЕ ==================
  manual_test:
    name: 🧪 ${{ inputs.test_type }} Tests (Python ${{ inputs.python_version }})
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock
          pip install flake8 black mypy pylint bandit safety
          pip install memory-profiler psutil
      
      # ============ UNIT TESTS ============
      - name: 🧪 Unit Tests
        if: inputs.test_type == 'all' || inputs.test_type == 'unit'
        run: |
          echo "::group::🧪 Running Unit Tests"
          
          if [[ "${{ inputs.verbose }}" == "true" ]]; then
            pytest tests/ -v --tb=long --cov=src --cov-report=term-missing
          else
            pytest tests/ --cov=src --cov-report=term
          fi
          
          echo "::endgroup::"
      
      # ============ INTEGRATION TESTS ============
      - name: 🔗 Integration Tests
        if: inputs.test_type == 'all' || inputs.test_type == 'integration'
        env:
          TELEGRAM_BOT_TOKEN: "test_token"
          TEST_MODE: "true"
        run: |
          echo "::group::🔗 Integration Testing"
          
          python -c "
          import sys
          sys.path.append('src')
          
          print('🔗 Testing bot integration...')
          
          # Тестируем полную инициализацию бота
          try:
              from bot import app, get_main_menu_keyboard, get_date_keyboard
              from database.db_manager import DatabaseManager
              from monitoring.crash_handler import CrashHandler
              from utils import FinalMarshrutochkaParser
              
              print('✅ All modules imported successfully')
              
              # Тестируем создание клавиатур
              menu = get_main_menu_keyboard(12345)
              dates = get_date_keyboard()
              
              print('✅ Keyboard generation works')
              
              # Тестируем базовые функции
              print('✅ Integration tests completed successfully')
              
          except Exception as e:
              print(f'❌ Integration test failed: {e}')
              import traceback
              traceback.print_exc()
              sys.exit(1)
          "
          
          echo "::endgroup::"
      
      # ============ PERFORMANCE TESTS ============
      - name: ⚡ Performance Tests
        if: inputs.test_type == 'all' || inputs.test_type == 'performance'
        run: |
          echo "::group::⚡ Performance Testing"
          
          python -c "
          import sys
          import time
          import psutil
          import os
          sys.path.append('src')
          
          process = psutil.Process(os.getpid())
          
          print('⚡ Starting performance tests...')
          initial_memory = process.memory_info().rss / 1024 / 1024
          print(f'Initial memory: {initial_memory:.2f} MB')
          
          # Тест времени импорта модулей
          start_time = time.time()
          try:
              from bot import *
              from utils import *
              from database import *
              from monitoring import *
          except:
              pass
          import_time = time.time() - start_time
          print(f'Module import time: {import_time:.3f} seconds')
          
          # Тест использования памяти
          final_memory = process.memory_info().rss / 1024 / 1024
          memory_increase = final_memory - initial_memory
          print(f'Final memory: {final_memory:.2f} MB')
          print(f'Memory increase: {memory_increase:.2f} MB')
          
          # Тест создания объектов
          start_time = time.time()
          try:
              from bot import get_main_menu_keyboard
              for i in range(100):
                  keyboard = get_main_menu_keyboard(i)
          except:
              pass
          object_creation_time = time.time() - start_time
          print(f'100 keyboard creations: {object_creation_time:.3f} seconds')
          
          # Проверяем результаты
          if import_time > 5.0:
              print('⚠️ Slow module imports detected')
          if memory_increase > 100:
              print('⚠️ High memory usage detected')
          if object_creation_time > 1.0:
              print('⚠️ Slow object creation detected')
              
          print('✅ Performance tests completed')
          "
          
          echo "::endgroup::"
      
      # ============ SECURITY TESTS ============
      - name: 🔒 Security Tests
        if: inputs.test_type == 'all' || inputs.test_type == 'security'
        run: |
          echo "::group::🔒 Security Testing"
          
          echo "🔍 Running Bandit security scan..."
          bandit -r src/ -f json -o bandit-report.json || true
          
          if [[ "${{ inputs.verbose }}" == "true" ]]; then
            bandit -r src/ -v
          else
            bandit -r src/
          fi
          
          echo ""
          echo "🛡️ Running Safety dependency check..."
          safety check --json --output safety-report.json || true
          safety check || true
          
          echo ""
          echo "🔐 Checking for secrets in code..."
          grep -r -i -E "(password|token|secret|key|api)" src/ --include="*.py" | grep -v "# " || echo "No hardcoded secrets found"
          
          echo "::endgroup::"
      
      - name: 📊 Test Summary
        if: always()
        run: |
          echo "## 🧪 Manual Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Type:** ${{ inputs.test_type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Python Version:** ${{ inputs.python_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Verbose Output:** ${{ inputs.verbose }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "**Result:** ✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Result:** ❌ Some tests failed" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: 📤 Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-test-results-${{ inputs.test_type }}-python${{ inputs.python_version }}
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 7

  # ================== ДОПОЛНИТЕЛЬНАЯ ДИАГНОСТИКА ==================
  diagnostics:
    name: 🔍 System Diagnostics
    runs-on: ubuntu-latest
    if: inputs.test_type == 'all'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python_version }}
      
      - name: 🔍 System Information
        run: |
          echo "::group::🖥️ System Information"
          echo "OS: $(uname -a)"
          echo "Python: $(python --version)"
          echo "Pip: $(pip --version)"
          echo "CPU cores: $(nproc)"
          echo "Memory: $(free -h)"
          echo "Disk: $(df -h .)"
          echo "::endgroup::"
      
      - name: 📦 Dependency Analysis
        run: |
          echo "::group::📦 Dependencies"
          pip install -r requirements.txt
          pip list
          echo "::endgroup::"
          
          echo "::group::🔍 Dependency Tree"
          pip install pipdeptree
          pipdeptree
          echo "::endgroup::"
      
      - name: 📁 Project Structure
        run: |
          echo "::group::📁 Project Structure"
          find . -type f -name "*.py" | head -20
          echo "::endgroup::"
          
          echo "::group::📊 Code Statistics"
          find . -name "*.py" -type f -exec wc -l {} + | sort -n | tail -10
          echo ""
          echo "Total Python files: $(find . -name "*.py" -type f | wc -l)"
          echo "Total lines of code: $(find . -name "*.py" -type f -exec cat {} + | wc -l)"
          echo "::endgroup::"
