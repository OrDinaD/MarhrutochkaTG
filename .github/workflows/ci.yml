name: 🤖 CI/CD Pipeline

on:
  push:
    branches: [ main, beta, develop ]
  pull_request:
    branches: [ main, beta ]
  schedule:
    # Запускаем каждый день в 6:00 UTC для проверки актуальности тестов
    - cron: '0 6 * * *'

jobs:
  # ================== ТЕСТИРОВАНИЕ ==================
  test:
    name: 🧪 Tests & Quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio mock
          pip install flake8 black mypy pylint
      
      - name: 🔍 Code Quality Checks
        run: |
          echo "::group::🔍 Flake8 Linting"
          flake8 src/ --max-line-length=120 --ignore=E203,W503 || true
          echo "::endgroup::"
          
          echo "::group::🎨 Black Code Formatting"
          black --check src/ || true
          echo "::endgroup::"
          
          echo "::group::📊 MyPy Type Checking"
          mypy src/ --ignore-missing-imports || true
          echo "::endgroup::"
      
      - name: 🧪 Run Unit Tests
        run: |
          echo "::group::🧪 Running Pytest"
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=html
          echo "::endgroup::"
      
      - name: 🔥 Run Integration Tests
        run: |
          echo "::group::🔥 Integration Tests"
          python tests/test_all.py
          echo "::endgroup::"
      
      - name: 📊 Upload Coverage Reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ================== БЕЗОПАСНОСТЬ ==================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 🔒 Run Security Checks
        run: |
          pip install bandit safety
          
          echo "::group::🔒 Bandit Security Scanner"
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ || true
          echo "::endgroup::"
          
          echo "::group::🛡️ Safety Dependency Check"
          safety check --json --output safety-report.json || true
          safety check || true
          echo "::endgroup::"
      
      - name: 📤 Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # ================== КОНТЕЙНЕРИЗАЦИЯ ==================
  docker:
    name: 🐳 Docker Build & Test
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔨 Build Docker Image
        run: |
          docker build -t marha-bot:test .
      
      - name: 🧪 Test Docker Container
        run: |
          # Проверяем, что контейнер может запуститься
          docker run --rm --entrypoint python marha-bot:test --version
          
          # Проверяем наличие основных файлов
          docker run --rm marha-bot:test ls -la src/
      
      - name: 🔍 Docker Security Scan
        run: |
          # Устанавливаем trivy для сканирования уязвимостей
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy
          
          # Сканируем образ
          trivy image --exit-code 0 --severity HIGH,CRITICAL marha-bot:test

  # ================== ФУНКЦИОНАЛЬНЫЕ ТЕСТЫ ==================
  functional:
    name: 🎯 Functional Tests
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-mock
      
      - name: 🎯 Bot Functionality Tests
        env:
          TELEGRAM_BOT_TOKEN: "test_token"
          TEST_MODE: "true"
        run: |
          echo "::group::🤖 Bot Startup Tests"
          python -c "
          import sys
          sys.path.append('src')
          try:
              from bot import get_main_menu_keyboard, get_date_keyboard
              print('✅ Bot modules imported successfully')
              
              # Тестируем основные функции
              keyboard = get_main_menu_keyboard(12345)
              print('✅ Main menu keyboard created')
              
              date_keyboard = get_date_keyboard()
              print('✅ Date keyboard created')
              
              print('✅ All bot functionality tests passed')
          except Exception as e:
              print(f'❌ Bot functionality test failed: {e}')
              sys.exit(1)
          "
          echo "::endgroup::"
          
          echo "::group::🗄️ Database Tests"
          python -c "
          import sys
          sys.path.append('src')
          try:
              from database import db_manager
              print('✅ Database module imported successfully')
          except Exception as e:
              print(f'⚠️ Database test warning: {e}')
          "
          echo "::endgroup::"
      
      - name: 🔗 API Integration Tests
        run: |
          echo "::group::🔗 Testing External APIs"
          python -c "
          import sys
          sys.path.append('src')
          try:
              from utils import FinalMarshrutochkaParser
              print('✅ Parser module imported successfully')
          except Exception as e:
              print(f'⚠️ Parser test warning: {e}')
          "
          echo "::endgroup::"

  # ================== ПРОИЗВОДИТЕЛЬНОСТЬ ==================
  performance:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install memory-profiler psutil
      
      - name: ⚡ Performance Benchmarks
        run: |
          echo "::group::⚡ Memory Usage Tests"
          python -c "
          import sys
          import psutil
          import os
          sys.path.append('src')
          
          process = psutil.Process(os.getpid())
          initial_memory = process.memory_info().rss / 1024 / 1024  # MB
          print(f'Initial memory usage: {initial_memory:.2f} MB')
          
          try:
              # Импортируем основные модули
              from bot import *
              from utils import *
              from database import *
              
              final_memory = process.memory_info().rss / 1024 / 1024  # MB
              memory_increase = final_memory - initial_memory
              
              print(f'Final memory usage: {final_memory:.2f} MB')
              print(f'Memory increase: {memory_increase:.2f} MB')
              
              if memory_increase > 100:  # Больше 100MB
                  print('⚠️ High memory usage detected')
              else:
                  print('✅ Memory usage is acceptable')
                  
          except Exception as e:
              print(f'❌ Performance test failed: {e}')
          "
          echo "::endgroup::"

  # ================== ОТЧЁТЫ И АРТЕФАКТЫ ==================
  artifacts:
    name: 📋 Generate Reports
    runs-on: ubuntu-latest
    needs: [test, security, functional]
    if: always()
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-html
      
      - name: 📋 Generate Test Report
        run: |
          pytest tests/ --html=test-report.html --self-contained-html || true
      
      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            test-report.html
            coverage.xml
            htmlcov/
          retention-days: 30
      
      - name: 📊 Generate Project Summary
        run: |
          echo "# 🤖 MarhrutochkaTG Test Report" > test-summary.md
          echo "" >> test-summary.md
          echo "**Date:** $(date)" >> test-summary.md
          echo "**Commit:** ${{ github.sha }}" >> test-summary.md
          echo "**Branch:** ${{ github.ref_name }}" >> test-summary.md
          echo "" >> test-summary.md
          echo "## 📊 Test Results" >> test-summary.md
          echo "- Python versions tested: 3.9, 3.10, 3.11, 3.12" >> test-summary.md
          echo "- Security scan: Completed" >> test-summary.md
          echo "- Docker build: Completed" >> test-summary.md
          echo "- Functional tests: Completed" >> test-summary.md
          echo "- Performance tests: Completed" >> test-summary.md
      
      - name: 📤 Upload Summary
        uses: actions/upload-artifact@v4
        with:
          name: test-summary-${{ github.run_number }}
          path: test-summary.md

  # ================== УВЕДОМЛЕНИЯ ==================
  notify:
    name: 📢 Notifications
    runs-on: ubuntu-latest
    needs: [test, security, docker, functional, performance]
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta')
    
    steps:
      - name: 📢 Prepare Status
        id: status
        run: |
          if [[ "${{ needs.test.result }}" == "success" && "${{ needs.security.result }}" == "success" && "${{ needs.docker.result }}" == "success" ]]; then
            echo "status=✅ Success" >> $GITHUB_OUTPUT
            echo "emoji=🎉" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Failed" >> $GITHUB_OUTPUT
            echo "emoji=🚨" >> $GITHUB_OUTPUT
          fi
      
      - name: 📢 Generate Summary
        run: |
          echo "${{ steps.status.outputs.emoji }} **MarhrutochkaTG CI/CD Pipeline**" 
          echo ""
          echo "**Status:** ${{ steps.status.outputs.status }}"
          echo "**Branch:** ${{ github.ref_name }}"
          echo "**Commit:** ${{ github.sha }}"
          echo ""
          echo "**Results:**"
          echo "- Tests: ${{ needs.test.result }}"
          echo "- Security: ${{ needs.security.result }}"
          echo "- Docker: ${{ needs.docker.result }}"
          echo "- Functional: ${{ needs.functional.result }}"
          echo "- Performance: ${{ needs.performance.result }}"
