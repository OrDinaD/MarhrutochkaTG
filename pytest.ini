[tool:pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py *_test.py
python_functions = test_*
python_classes = Test* *Tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --cov=src.bot
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=100
    --no-header
    --showlocals
    --durations=10

# 🔧 Настройки покрытия кода
[coverage:run]
source = src.bot
omit = 
    src/__pycache__/*
    src/*/migrations/*
    src/*/tests/*
    */venv/*
    */env/*
    */test_*
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol.*\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml
