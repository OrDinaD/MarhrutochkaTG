<svg width="300" height="600" viewBox="0 0 300 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="phoneGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1C1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C2C2E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1C1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C2C2E;stop-opacity:1" />
    </linearGradient>
    <filter id="phoneGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="screenShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Phone body -->
  <rect x="0" y="0" width="300" height="600" rx="40" ry="40" fill="url(#phoneGradient)" filter="url(#phoneGlow)"/>
  
  <!-- Screen -->
  <rect x="20" y="20" width="260" height="560" rx="30" ry="30" fill="url(#screenGradient)" filter="url(#screenShadow)"/>
  
  <!-- Status bar -->
  <rect x="20" y="20" width="260" height="40" rx="30" ry="30" fill="url(#headerGradient)"/>
  
  <!-- Time -->
  <text x="40" y="45" font-family="SF Pro Display, -apple-system, system-ui" font-size="16" font-weight="600" fill="white">12:32</text>
  
  <!-- Battery and signal -->
  <g transform="translate(220, 32)">
    <!-- Signal bars -->
    <circle cx="5" cy="8" r="1.5" fill="white"/>
    <circle cx="10" cy="8" r="1.5" fill="white"/>
    <circle cx="15" cy="8" r="1.5" fill="white"/>
    <circle cx="20" cy="8" r="1.5" fill="white"/>
    
    <!-- WiFi -->
    <path d="M35 8 C35 4, 45 4, 45 8" stroke="white" stroke-width="1" fill="none"/>
    <path d="M37 8 C37 6, 43 6, 43 8" stroke="white" stroke-width="1" fill="none"/>
    <circle cx="40" cy="8" r="1" fill="white"/>
    
    <!-- Battery -->
    <rect x="50" y="5" width="20" height="10" rx="2" ry="2" stroke="white" stroke-width="1" fill="none"/>
    <rect x="70" y="7" width="2" height="6" rx="1" ry="1" fill="white"/>
    <rect x="52" y="7" width="16" height="6" rx="1" ry="1" fill="#34C759"/>
  </g>
  
  <!-- App header -->
  <rect x="20" y="60" width="260" height="60" fill="#007AFF"/>
  
  <!-- Back button -->
  <g transform="translate(35, 80)">
    <circle cx="10" cy="10" r="8" fill="rgba(255,255,255,0.2)"/>
    <path d="M6 10 L10 6 L10 8 L14 8 L14 12 L10 12 L10 14 Z" fill="white"/>
  </g>
  
  <!-- App title -->
  <text x="150" y="95" font-family="SF Pro Display, -apple-system, system-ui" font-size="18" font-weight="600" fill="white" text-anchor="middle">Мониторинг маршруточки</text>
  
  <!-- Bot avatar -->
  <g transform="translate(245, 75)">
    <circle cx="15" cy="15" r="15" fill="white"/>
    <text x="15" y="22" font-family="Apple Color Emoji" font-size="20" text-anchor="middle">🚌</text>
  </g>
  
  <!-- Chat content -->
  <rect x="20" y="120" width="260" height="460" fill="#000000"/>
  
  <!-- Bot info message -->
  <g transform="translate(40, 200)">
    <rect x="0" y="0" width="220" height="200" rx="20" ry="20" fill="#1C1C1E"/>
    
    <!-- "Что умеет этот бот?" -->
    <text x="20" y="30" font-family="SF Pro Text, -apple-system, system-ui" font-size="16" font-weight="600" fill="white">Что умеет этот бот?</text>
    
    <!-- Bus icon -->
    <g transform="translate(20, 40)">
      <rect x="0" y="0" width="20" height="12" rx="2" ry="2" fill="#007AFF"/>
      <circle cx="4" cy="15" r="2" fill="#8E8E93"/>
      <circle cx="16" cy="15" r="2" fill="#8E8E93"/>
      <text x="25" y="12" font-family="SF Pro Text, -apple-system, system-ui" font-size="14" fill="white">Автоматический мониторинг рейсов</text>
      <text x="25" y="25" font-family="SF Pro Text, -apple-system, system-ui" font-size="14" fill="white">Минск-Островец</text>
    </g>
    
    <!-- Features list -->
    <g transform="translate(20, 70)">
      <!-- Feature 1 -->
      <circle cx="5" cy="5" r="3" fill="#34C759"/>
      <text x="15" y="9" font-family="SF Pro Text, -apple-system, system-ui" font-size="13" fill="white">Поиск по дате и времени</text>
      
      <!-- Feature 2 -->
      <g transform="translate(0, 20)">
        <text x="0" y="9" font-family="Apple Color Emoji" font-size="13">🔔</text>
        <text x="15" y="9" font-family="SF Pro Text, -apple-system, system-ui" font-size="13" fill="white">Уведомления каждые 5 минут</text>
      </g>
      
      <!-- Feature 3 -->
      <g transform="translate(0, 40)">
        <rect x="0" y="0" width="10" height="6" rx="2" ry="2" fill="#007AFF"/>
        <text x="15" y="5" font-family="SF Pro Text, -apple-system, system-ui" font-size="13" fill="white">Удобные кнопки</text>
      </g>
    </g>
    
    <!-- Start command -->
    <g transform="translate(20, 150)">
      <text x="0" y="15" font-family="SF Mono, Monaco, Consolas, monospace" font-size="14" fill="#007AFF">/start</text>
      <text x="50" y="15" font-family="SF Pro Text, -apple-system, system-ui" font-size="14" fill="#8E8E93">- начать работу</text>
    </g>
  </g>
  
  <!-- Input area -->
  <rect x="20" y="520" width="260" height="60" fill="#1C1C1E"/>
  <rect x="30" y="535" width="200" height="30" rx="15" ry="15" fill="#2C2C2E" stroke="#48484A" stroke-width="1"/>
  <text x="40" y="555" font-family="SF Pro Text, -apple-system, system-ui" font-size="14" fill="#8E8E93">Сообщение</text>
  
  <!-- Send button -->
  <circle cx="250" cy="550" r="15" fill="#007AFF"/>
  <path d="M245 550 L250 545 L255 550 L250 555 Z" fill="white"/>
  
  <!-- Home indicator -->
  <rect x="120" y="570" width="60" height="4" rx="2" ry="2" fill="#48484A"/>
</svg>