<svg width="375" height="812" viewBox="0 0 375 812" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone frame -->
  <rect width="375" height="812" rx="40" fill="#000000"/>
  <rect x="20" y="20" width="335" height="772" rx="30" fill="#1a1a1a"/>
  
  <!-- Status bar -->
  <rect x="30" y="40" width="315" height="30" fill="#2d2d2d"/>
  <text x="50" y="58" fill="#ffffff" font-family="Arial, sans-serif" font-size="14">12:32</text>
  <text x="280" y="58" fill="#00ff00" font-family="Arial, sans-serif" font-size="12">59%</text>
  <text x="310" y="58" fill="#ffffff" font-family="Arial, sans-serif" font-size="12">📶 📶</text>
  
  <!-- Header -->
  <rect x="30" y="80" width="315" height="60" fill="#3a3a3a"/>
  <circle cx="60" cy="110" r="15" fill="#0088cc"/>
  <text x="90" y="118" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Мониторинг маршруточки</text>
  
  <!-- Main content area -->
  <rect x="30" y="150" width="315" height="500" fill="#2d2d2d"/>
  
  <!-- Bot description -->
  <rect x="50" y="680" width="275" height="80" rx="10" fill="#3a3a3a"/>
  <text x="60" y="700" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Что умеет этот бот?</text>
  <text x="60" y="720" fill="#00aa00" font-family="Arial, sans-serif" font-size="12">🚌 Автоматический мониторинг рейсов</text>
  <text x="60" y="735" fill="#00aa00" font-family="Arial, sans-serif" font-size="12">Минск-Островец</text>
  <text x="60" y="755" fill="#00aa00" font-family="Arial, sans-serif" font-size="12">✅ Поиск по дате и времени</text>
  
  <!-- Bottom input area -->
  <rect x="30" y="760" width="315" height="40" rx="20" fill="#404040"/>
  <text x="50" y="782" fill="#888888" font-family="Arial, sans-serif" font-size="12">/start - начать работу</text>
  
  <!-- Telegram logo -->
  <circle cx="200" cy="200" r="25" fill="#0088cc"/>
  <path d="M190 195 l15 5 l-5 15 l-10 -20 z" fill="#ffffff"/>
</svg>
