# Railway конфигурация для Telegram Bot
# Документация: https://docs.railway.app/reference/config-as-code

[build]
builder = "NIXPACKS"

[deploy]
# Команда запуска перенесена в nixpacks.toml для лучшей организации
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Это worker процесс (не web сервис) - отключаем HTTP healthcheck
[deploy.healthcheck]
enabled = false

# Переменные окружения (могут быть переопределены в Railway Dashboard)
[env]
PYTHONUNBUFFERED = "1"
MONITORING_ENABLED = "true"
MONITORING_INTERVAL_MINUTES = "5"
MONITORING_STORAGE = "file"
