[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python main.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Указываем что это worker, а не web service - отключаем HTTP healthcheck
[deploy.healthcheck]
enabled = false

# Переменные окружения по умолчанию (могут быть переопределены в Railway dashboard)
[env]
PYTHONUNBUFFERED = "1"
MONITORING_ENABLED = "true"
MONITORING_INTERVAL_MINUTES = "5"
MONITORING_STORAGE = "redis"

# Важно: это worker процесс, не web сервис - без порта
[service]
type = "worker"
